<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Generate Invoice - Chadwick &amp; Associates')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="page-header">
            <h1>Generate Invoice</h1>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <div class="card-header">New Invoice</div>
            <form th:action="@{/cases/{id}/invoices/create(id=${caseId})}" method="post">
                <div class="form-group">
                    <label for="billingType">Billing Type</label>
                    <select id="billingType" name="billingType" class="form-control" required="required">
                        <option value="">-- Select Billing Type --</option>
                        <option value="HOURLY">Hourly</option>
                        <option value="FLAT_FEE">Flat Fee</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="hours">Hours</label>
                    <input type="number" id="hours" name="hours" class="form-control" step="0.5" min="0" placeholder="Number of hours (for hourly billing)"/>
                </div>

                <div class="form-group">
                    <label for="rate">Rate ($/hr or Flat Fee Amount)</label>
                    <input type="number" id="rate" name="rate" class="form-control" step="0.01" min="0" placeholder="Enter rate or flat fee amount" required="required"/>
                </div>

                <div class="actions" style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Generate Invoice</button>
                    <a th:href="@{/cases/{id}(id=${caseId})}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
