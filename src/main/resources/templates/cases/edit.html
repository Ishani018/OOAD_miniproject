<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Case - Chadwick &amp; Associates')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="page-header">
            <h1>Edit Case &mdash; <span th:text="${legalCase.caseNumber}">C-001</span></h1>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <form th:action="@{/cases/{id}/edit(id=${legalCase.id})}" method="post">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" class="form-control" th:value="${legalCase.title}" required="required"/>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" class="form-control" th:text="${legalCase.description}"></textarea>
                </div>

                <div class="actions" style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a th:href="@{/cases/{id}(id=${legalCase.id})}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
