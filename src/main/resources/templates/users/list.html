<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('User Management - Chadwick &amp; Associates')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="page-header">
            <h1>User Management</h1>
            <div class="actions">
                <a th:href="@{/admin/users/create}" class="btn btn-primary">Add User</a>
            </div>
        </div>

        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.name}">User Name</td>
                        <td th:text="${u.email}">user@example.com</td>
                        <td th:text="${u.role}">ADMIN</td>
                        <td>
                            <span th:if="${u.locked}" class="badge badge-rejected">Locked</span>
                            <span th:unless="${u.locked}" class="badge badge-active">Active</span>
                        </td>
                        <td>
                            <div class="actions">
                                <a th:href="@{/admin/users/{id}/edit(id=${u.id})}" class="btn btn-sm btn-secondary">Edit</a>
                                <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" style="display:inline;"
                                      onsubmit="return confirm('Are you sure you want to delete this user?');">
                                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                </form>
                                <form th:if="${u.locked}" th:action="@{/admin/users/{id}/unlock(id=${u.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-success">Unlock</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" style="text-align:center; color:var(--text-light);">No users found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
