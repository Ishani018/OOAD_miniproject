<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit User - Chadwick &amp; Associates')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="page-header">
            <h1>Edit User</h1>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <div class="card">
            <div class="card-header">Update User Details</div>
            <form th:action="@{/admin/users/{id}/edit(id=${editUser.id})}" method="post">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" th:value="${editUser.name}" required="required"/>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" th:value="${editUser.email}" required="required"/>
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" class="form-control" required="required">
                        <option value="ADMIN" th:selected="${editUser.role == 'ADMIN'}">Admin</option>
                        <option value="LAWYER" th:selected="${editUser.role == 'LAWYER'}">Lawyer</option>
                        <option value="STAFF" th:selected="${editUser.role == 'STAFF'}">Staff</option>
                        <option value="CLIENT" th:selected="${editUser.role == 'CLIENT'}">Client</option>
                    </select>
                </div>

                <div class="actions" style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
